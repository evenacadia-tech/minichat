<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Die Matrix</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#070810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Die Matrix">
<link rel="apple-touch-icon" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Fira+Code:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

@keyframes fadeUp   { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes fadeIn   { from { opacity:0 } to { opacity:1 } }
@keyframes msgSlide { from { opacity:0; transform:translateY(5px) } to { opacity:1; transform:translateY(0) } }
@keyframes pulse    { 0%,100% { opacity:1 } 50% { opacity:.4 } }
@keyframes glowPulse{ 0%,100% { filter: brightness(1) } 50% { filter: brightness(1.2) } }
@keyframes bracketReveal { from { opacity:0; transform:scale(.92) } to { opacity:1; transform:scale(1) } }
@keyframes scanMove { from { background-position:0 0 } to { background-position:0 4px } }

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0 }

:root {
  --bg:        #070810;
  --s1:        #0C0D18;
  --s2:        #10121F;
  --s3:        #161826;
  --border:    #1C2035;
  --border-hi: #2A3055;
  --text:      #DDE4FF;
  --text-dim:  #8A95C0;
  --muted:     #424870;
  --muted-hi:  #6070A0;
  --red:       #FF3355;
  --blue:      #4488FF;
  --accent:    #FF3355;
  --accent-dim:#AA2244;
  --accent-bg: rgba(255,51,85,.05);
  --accent-glow: 0 0 18px rgba(255,51,85,.35), 0 0 40px rgba(68,136,255,.2);
  --grad:      linear-gradient(135deg, #FF3355 0%, #4488FF 100%);
  --grad-h:    linear-gradient(135deg, #FF5577 0%, #66AAFF 100%);
  --grad-glow: 0 0 24px rgba(255,51,85,.3), 0 0 48px rgba(68,136,255,.2);
  --green:     #33DDAA;
  --own-bg:    #0A0B16;
  --own-border:#FF3355;
  --r: 0px;
  --mono: 'Fira Code', 'Courier New', monospace;
  --display: 'Syne', sans-serif;
}

html, body { height:100%; overflow:hidden }
body {
  font-family: var(--mono);
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
}

/* ── Atmosphere layers ── */
body::before {
  content:'';
  position:fixed; inset:0;
  background-image: radial-gradient(circle, rgba(68,136,255,.04) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events:none;
  z-index:0;
}
body::after {
  content:'';
  position:fixed; inset:0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 3px,
    rgba(0,0,0,.018) 3px,
    rgba(0,0,0,.018) 4px
  );
  pointer-events:none;
  z-index:9999;
  animation: scanMove .1s linear infinite;
}

.hidden { display:none !important }

/* ── Scrollbar ── */
::-webkit-scrollbar { width:5px; height:5px }
::-webkit-scrollbar-track { background:transparent }
::-webkit-scrollbar-thumb { background:var(--border-hi) }
::-webkit-scrollbar-thumb:hover { background:var(--muted) }

/* ════════════════════════════════════
   AUTH
═══════════════════════════════════ */
#auth {
  position:relative; z-index:1;
  display:flex; align-items:center; justify-content:center;
  height:100vh;
  background:
    radial-gradient(ellipse 50% 60% at 30% 50%, rgba(255,51,85,.06) 0%, transparent 70%),
    radial-gradient(ellipse 50% 60% at 70% 50%, rgba(68,136,255,.06) 0%, transparent 70%);
  animation: fadeIn .5s ease;
}

.auth-box {
  width:420px;
  background:var(--s1);
  border:1px solid var(--border);
  padding:40px 36px 32px;
  display:flex; flex-direction:column; gap:22px;
  position:relative;
  animation: fadeUp .45s cubic-bezier(.22,1,.36,1);
}

/* Four-corner bracket decoration */
.auth-box::before,
.auth-box::after {
  content:'';
  position:absolute;
  width:16px; height:16px;
  border-style:solid;
  opacity:0;
  animation: bracketReveal .4s ease .35s forwards;
}
.auth-box::before { top:-1px; left:-1px; border-width:2px 0 0 2px; border-color:var(--red) }
.auth-box::after  { bottom:-1px; right:-1px; border-width:0 2px 2px 0; border-color:var(--blue) }

.auth-logo {
  font-family:var(--display);
  font-size:28px;
  font-weight:800;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing:.06em;
  display:flex; align-items:center; gap:10px;
}
.auth-logo-dot {
  width:10px; height:10px;
  background: var(--grad);
  box-shadow: var(--grad-glow);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink:0;
}

.auth-tabs {
  display:flex;
  border-bottom:1px solid var(--border);
  margin-bottom:-4px;
}
.auth-tab {
  padding:8px 20px;
  cursor:pointer;
  color:var(--muted);
  border-bottom:1px solid transparent;
  margin-bottom:-1px;
  font-size:11px;
  letter-spacing:.12em;
  text-transform:uppercase;
  font-family:var(--mono);
  transition:color .15s, border-color .15s;
}
.auth-tab.active { color:var(--blue); border-bottom-color:var(--blue) }
.auth-tab:hover:not(.active) { color:var(--text-dim) }

.field { display:flex; flex-direction:column; gap:6px }
.field label {
  font-size:11px;
  color:var(--muted);
  letter-spacing:.1em;
  text-transform:uppercase;
}

input[type="text"],
input[type="email"],
input[type="password"] {
  width:100%;
  padding:10px 14px;
  background:var(--s2);
  border:1px solid var(--border);
  border-bottom-color:var(--border-hi);
  color:var(--text);
  font-family:var(--mono);
  font-size:14px;
  outline:none;
  border-radius:0;
  transition:border-color .15s, box-shadow .15s;
  letter-spacing:.03em;
}
input:focus {
  border-color:var(--blue);
  box-shadow:0 0 0 1px rgba(68,136,255,.15), inset 0 1px 8px rgba(68,136,255,.04);
}
input::placeholder { color:var(--muted); opacity:.7 }

.btn {
  padding:11px 20px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:1px solid var(--border);
  border-radius:0;
  transition:all .15s;
  background:transparent;
  color:var(--muted);
}
.btn:disabled { opacity:.35; cursor:default }

.btn-primary {
  background: var(--grad);
  color:#fff;
  border:none;
  font-weight:600;
  letter-spacing:.12em;
}
.btn-primary:hover:not(:disabled) {
  background: var(--grad-h);
  box-shadow: var(--grad-glow);
  transform:translateY(-1px);
}
.btn-primary:active:not(:disabled) { transform:translateY(0) }

.btn-ghost { color:var(--muted) }
.btn-ghost:hover:not(:disabled) { color:var(--text-dim); border-color:var(--muted-hi) }

.btn-danger {
  color:#FF4466; border-color:transparent;
  font-size:12px; padding:7px 14px;
}
.btn-danger:hover:not(:disabled) {
  border-color:#FF4466;
  background:rgba(255,68,102,.07);
}

.err { color:var(--red); font-size:12px; min-height:16px; letter-spacing:.04em }
.info-msg { color:var(--muted-hi); font-size:12px; line-height:1.75; letter-spacing:.03em }

.auth-hint {
  font-size:11px; color:var(--muted); line-height:1.8;
  border-top:1px solid var(--border); padding-top:14px;
  opacity:.65; letter-spacing:.02em;
}

/* ════════════════════════════════════
   APP LAYOUT
═══════════════════════════════════ */
#app { display:none; height:100vh; flex-direction:column; position:relative; z-index:1 }
#app.on { display:flex; animation:fadeIn .3s ease }

.topbar {
  height:54px; flex-shrink:0;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center;
  padding:0 16px; gap:0;
  position:relative;
}
/* Gradient accent line along bottom of topbar */
.topbar::after {
  content:'';
  position:absolute; bottom:0; left:0;
  width:100%; height:1px;
  background: linear-gradient(90deg, var(--red) 0%, var(--blue) 50%, transparent 100%);
  opacity:.6;
}

.topbar-logo {
  font-family:var(--display);
  font-size:19px;
  font-weight:800;
  background: var(--grad);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing:.07em;
  display:flex; align-items:center; gap:8px;
  margin-right:4px;
  white-space:nowrap;
}
.topbar-logo-dot {
  width:8px; height:8px;
  background: var(--grad);
  box-shadow: var(--grad-glow);
  animation:pulse 2.5s ease-in-out infinite;
}

.topbar-divider {
  width:1px; height:18px;
  background:var(--border-hi);
  margin:0 16px;
}

.topbar-tabs { display:flex; gap:2px }
.tab-btn {
  padding:6px 16px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:12px;
  letter-spacing:.1em;
  text-transform:uppercase;
  background:transparent;
  border:1px solid transparent;
  color:var(--muted);
  border-radius:0;
  transition:all .15s;
}
.tab-btn.on {
  color:var(--blue);
  border-color:var(--border-hi);
  background:rgba(68,136,255,.06);
}
.tab-btn:hover:not(.on) { color:var(--text-dim) }

.topbar-right {
  margin-left:auto;
  display:flex; align-items:center; gap:12px;
}
.who-tag {
  font-size:12px; color:var(--muted);
  display:flex; align-items:center; gap:7px;
  letter-spacing:.04em;
}
.who-online {
  width:7px; height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
}
.who-tag b { color:var(--text-dim); font-weight:400 }

.main { flex:1; overflow:hidden; position:relative }

/* ════════════════════════════════════
   CHAT
═══════════════════════════════════ */
#chat-view { display:none; flex-direction:column; height:100% }
#chat-view.on { display:flex }

.msg-list {
  flex:1; overflow-y:auto;
  padding:28px 32px 20px 32px;
  display:flex; flex-direction:column; gap:3px;
  background: linear-gradient(180deg, rgba(68,136,255,.025) 0%, transparent 140px);
}

/* Terminal-log style: all messages left-aligned, full width */
.msg {
  width:100%; align-self:stretch;
  padding:12px 18px 12px 20px;
  background:transparent;
  border:none;
  border-left:2px solid var(--blue);
  display:flex; flex-direction:row; gap:18px; align-items:baseline;
  animation:msgSlide .18s cubic-bezier(.22,1,.36,1);
  transition:background .1s, border-left-color .1s;
}
.msg:hover {
  background:rgba(68,136,255,.03);
  border-left-color:var(--blue);
}

/* Own messages: red left border */
.msg.own {
  border-left-color:var(--red);
}
.msg.own:hover { border-left-color:#FF5577; background:rgba(255,51,85,.03) }

.msg-meta {
  display:flex; flex-direction:column; align-items:flex-end;
  gap:3px; flex-shrink:0; width:90px;
}
.msg-meta .who {
  color:var(--blue);
  font-weight:600;
  font-size:11px;
  letter-spacing:.1em;
  text-transform:uppercase;
  white-space:nowrap;
}
.msg.own .msg-meta .who { color:var(--red) }
.msg-meta .time {
  color:var(--muted);
  font-size:10px;
  letter-spacing:.04em;
  white-space:nowrap;
}

.msg-content {
  flex:1;
  font-size:15px;
  white-space:pre-wrap;
  word-break:break-word;
  color:var(--text);
  line-height:1.7;
  font-weight:300;
  padding-top:1px;
}
.msg.own .msg-content { color:var(--text) }

/* Chat input area */
.chat-footer {
  flex-shrink:0;
  border-top:1px solid var(--border);
  padding:16px 32px 16px 28px;
  background:var(--s1);
  display:flex; gap:12px; align-items:flex-end;
}
.chat-prompt {
  color:var(--red);
  font-size:18px; line-height:1;
  flex-shrink:0;
  margin-bottom:13px;
  font-family:var(--mono);
  font-weight:600;
  opacity:.8;
  text-shadow:0 0 8px rgba(255,184,0,.4);
}
.chat-footer textarea {
  flex:1; resize:none; outline:none;
  background:transparent;
  border:none;
  border-bottom:1px solid var(--border-hi);
  color:var(--text);
  font-family:var(--mono);
  font-size:15px;
  padding:8px 0;
  border-radius:0;
  min-height:42px; max-height:140px;
  line-height:1.6;
  transition:border-color .15s;
  font-weight:300;
}
.chat-footer textarea:focus {
  border-bottom-color:var(--blue);
}
.chat-footer textarea::placeholder { color:var(--muted); opacity:.5 }

.send-btn {
  height:42px; width:42px; flex-shrink:0;
  background: var(--grad);
  color:#fff;
  border:none; border-radius:0;
  cursor:pointer;
  font-size:18px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  transition:all .15s;
  font-family:var(--mono);
}
.send-btn:hover {
  background: var(--grad-h);
  box-shadow: var(--grad-glow);
  transform:translateY(-1px);
}
.send-btn:active { transform:translateY(0); box-shadow:none }

/* ════════════════════════════════════
   NOTES
═══════════════════════════════════ */
#notes-view { display:none; height:100% }
#notes-view.on { display:flex }

.notes-sidebar {
  width:260px; flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--s1);
  display:flex; flex-direction:column;
}
.sidebar-hdr {
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
  font-size:11px; letter-spacing:.12em; text-transform:uppercase;
  color:var(--blue);
  font-family:var(--display);
  font-weight:700;
}
.sidebar-hdr-actions { display:flex; gap:4px }

.icon-btn {
  padding:5px 10px;
  cursor:pointer;
  font-family:var(--mono);
  font-size:11px; letter-spacing:.05em;
  background:transparent;
  border:1px solid var(--border);
  color:var(--muted);
  border-radius:0;
  transition:all .15s;
}
.icon-btn:hover { color:var(--text-dim); border-color:var(--blue) }

.note-list { flex:1; overflow-y:auto }
.note-item {
  padding:13px 18px;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  border-left:2px solid transparent;
  transition:all .1s;
}
.note-item:hover { background:var(--s2); border-left-color:var(--border-hi) }
.note-item.on { background:var(--s2); border-left-color:var(--blue) }
.note-item-title {
  font-size:14px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  margin-bottom:3px;
  color:var(--text);
  font-weight:400;
}
.note-item.on .note-item-title { color:var(--blue) }
.note-item-meta { font-size:11px; color:var(--muted); letter-spacing:.06em }

.notes-main { flex:1; display:flex; flex-direction:column; overflow:hidden }

.notes-toolbar {
  flex-shrink:0;
  padding:12px 20px;
  border-bottom:1px solid var(--border);
  background:var(--s1);
  display:flex; gap:8px; align-items:center;
}
.note-title-in {
  flex:1;
  background:transparent;
  border:none; border-bottom:1px solid var(--border);
  color:var(--text);
  font-family:var(--display);
  font-size:18px; font-weight:700;
  padding:2px 4px;
  outline:none; border-radius:0;
  transition:border-color .15s;
  letter-spacing:.04em;
}
.note-title-in:focus { border-bottom-color:var(--blue) }
.note-title-in::placeholder { color:var(--muted); opacity:.6; font-weight:600 }

.note-body { flex:1; overflow:hidden; position:relative }
.note-editor {
  width:100%; height:100%;
  background:transparent; border:none; outline:none; resize:none;
  color:var(--text);
  font-family:var(--mono); font-size:15px; line-height:1.85;
  padding:26px 30px;
  font-weight:300;
}
.note-editor::placeholder { color:var(--muted); opacity:.5 }

.note-viewer {
  width:100%; height:100%; overflow-y:auto;
  padding:26px 30px; font-size:15px; line-height:1.85;
}

/* ── Markdown styles ── */
.note-viewer h1,.note-viewer h2,.note-viewer h3 {
  font-family:var(--display);
  color:var(--blue);
  letter-spacing:.04em;
}
.note-viewer h1 { font-size:20px; font-weight:800; margin:26px 0 10px }
.note-viewer h2 { font-size:16px; font-weight:700; margin:20px 0 8px }
.note-viewer h3 { font-size:14px; font-weight:700; margin:16px 0 6px }
.note-viewer p  { margin-bottom:12px; color:var(--text); line-height:1.85; font-weight:300 }
.note-viewer code {
  background:var(--s2); border:1px solid var(--border);
  padding:1px 6px; font-size:11px; color:var(--blue);
}
.note-viewer pre {
  background:var(--s2); border:1px solid var(--border);
  border-left:2px solid var(--blue);
  padding:14px 16px; margin:12px 0; overflow-x:auto;
}
.note-viewer pre code {
  background:transparent; border:none; padding:0;
  color:var(--text-dim);
}
.note-viewer ul,.note-viewer ol { padding-left:22px; margin-bottom:12px }
.note-viewer li { margin-bottom:4px; font-weight:300 }
.note-viewer a { color:var(--blue); text-decoration:underline; text-underline-offset:3px }
.note-viewer blockquote {
  border-left:2px solid var(--red);
  padding-left:14px; color:var(--muted-hi);
  margin:12px 0; font-style:italic;
}
.note-viewer hr { border:none; border-top:1px solid var(--border); margin:22px 0 }
.note-viewer table { border-collapse:collapse; width:100%; margin:12px 0 }
.note-viewer th,.note-viewer td {
  border:1px solid var(--border);
  padding:6px 12px; font-size:12px;
}
.note-viewer th {
  color:var(--blue); background:var(--s2);
  font-family:var(--display); font-weight:700;
  letter-spacing:.08em; text-transform:uppercase; font-size:9px;
}

/* ── Empty states ── */
.empty-state {
  flex:1;
  display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
  color:var(--muted);
  font-size:12px; letter-spacing:.12em; text-transform:uppercase;
}
.empty-state-icon {
  font-size:36px; opacity:.25; color:var(--blue);
  display:block; margin-bottom:4px;
}

/* ── Toast ── */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--s2);
  border:1px solid var(--border-hi);
  border-left:2px solid var(--blue);
  color:var(--text);
  padding:10px 24px;
  font-size:12px; font-family:var(--mono);
  letter-spacing:.07em; text-transform:uppercase;
  opacity:0; transition:opacity .22s, transform .22s;
  pointer-events:none; z-index:9998;
  white-space:nowrap;
}
#toast.on { opacity:1; transform:translateX(-50%) translateY(0) }

</style>
</head>
<body>

<!-- ──── Auth ──── -->
<div id="auth">
  <div class="auth-box">
    <div class="auth-logo">
      <span class="auth-logo-dot"></span>
      Die Matrix
    </div>
    <div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:-10px">Nur für Mitglieder</div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="atab-login">Login</div>
      <div class="auth-tab" id="atab-reg">Register</div>
    </div>

    <div id="form-login">
      <div style="display:flex;flex-direction:column;gap:11px">
        <div class="field"><label>Email</label><input type="email" id="l-email" placeholder="name@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="l-pass" placeholder="••••••••"></div>
      </div>
    </div>

    <div id="form-reg" class="hidden">
      <div style="display:flex;flex-direction:column;gap:11px">
        <div class="field"><label>Display Name</label><input type="text" id="r-name" placeholder="your name"></div>
        <div class="field"><label>Email</label><input type="email" id="r-email" placeholder="name@example.com"></div>
        <div class="field"><label>Password</label><input type="password" id="r-pass" placeholder="min. 6 chars"></div>
      </div>
    </div>

    <div id="auth-info" class="info-msg hidden"></div>
    <div id="auth-err" class="err"></div>
    <button class="btn btn-primary" id="auth-btn">Login</button>
    <div class="auth-hint">
      Hinweis: E-Mail-Bestätigung muss im Supabase Dashboard unter<br>
      Auth → Settings deaktiviert sein.
    </div>
  </div>
</div>

<!-- ──── App ──── -->
<div id="app">
  <div class="topbar">
    <div class="topbar-logo">
      <span class="topbar-logo-dot"></span>
      Die Matrix
    </div>
    <div class="topbar-divider"></div>
    <div class="topbar-tabs">
      <button class="tab-btn on" id="vtab-chat">Chat</button>
      <button class="tab-btn" id="vtab-notes">Notes</button>
    </div>
    <div class="topbar-right">
      <span class="who-tag">
        <span class="who-online"></span>
        <b id="uname-display"></b>
      </span>
      <button class="btn btn-ghost" id="logout-btn" style="padding:5px 12px;font-size:11px">Logout</button>
    </div>
  </div>

  <div class="main">
    <!-- Chat View -->
    <div id="chat-view" class="on">
      <div class="msg-list" id="msg-list">
        <div class="empty-state" id="chat-empty" style="flex:1;margin:auto">
          <span class="empty-state-icon">◈</span>
          No messages yet
        </div>
      </div>
      <div class="chat-footer">
        <span class="chat-prompt">›</span>
        <textarea id="chat-in" placeholder="Message — Enter to send, Shift+Enter for newline" rows="1"></textarea>
        <button class="send-btn" id="send-btn">↑</button>
      </div>
    </div>

    <!-- Notes View -->
    <div id="notes-view">
      <div class="notes-sidebar">
        <div class="sidebar-hdr">
          <span>Notes</span>
          <div class="sidebar-hdr-actions">
            <button class="icon-btn" id="new-note-btn">+ New</button>
            <label class="icon-btn" for="md-upload" style="cursor:pointer">↑ .md</label>
            <input type="file" id="md-upload" accept=".md,.txt" style="display:none">
          </div>
        </div>
        <div class="note-list" id="note-list"></div>
      </div>

      <div class="notes-main">
        <div class="empty-state" id="notes-empty" style="height:100%">
          <span class="empty-state-icon">◈</span>
          Select or create a note
        </div>

        <div id="note-panel" class="hidden" style="display:flex;flex-direction:column;height:100%">
          <div class="notes-toolbar">
            <input type="text" class="note-title-in" id="note-title" placeholder="Title">
            <button class="icon-btn" id="toggle-mode-btn">Preview</button>
            <button class="btn btn-primary" id="save-note-btn" style="padding:7px 16px;font-size:11px">Save</button>
            <button class="btn btn-danger" id="del-note-btn">Delete</button>
          </div>
          <div class="note-body" id="note-body">
            <textarea class="note-editor" id="note-editor" placeholder="Write Markdown..."></textarea>
            <div class="note-viewer hidden" id="note-viewer"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'
import { marked } from 'https://esm.sh/marked@12'

// ── Config ──
const SUPABASE_URL = 'https://bbmqnharshychpcekgea.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJibXFuaGFyc2h5Y2hwY2VrZ2VhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMTUyODAsImV4cCI6MjA4OTU5MTI4MH0.Le1RH4TJd5EexixASeUzkDX_WPhOpmatksUeOcJ4OXw'
const sb = createClient(SUPABASE_URL, SUPABASE_KEY)

// ── State ──
let user = null
let username = ''
let noteMode = 'edit'
let currentNote = null // { id, title, content } | null
let rtChannel = null

// ── Utils ──
let toastTimer
function toast(msg, ms = 2200) {
  const el = document.getElementById('toast')
  el.textContent = msg
  el.classList.add('on')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => el.classList.remove('on'), ms)
}

const esc = s => s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') : ''
const $ = id => document.getElementById(id)

// ── Auth ──
let authMode = 'login'

$('atab-login').onclick = () => setAuthMode('login')
$('atab-reg').onclick = () => setAuthMode('reg')

function setAuthMode(mode) {
  authMode = mode
  $('form-login').classList.toggle('hidden', mode !== 'login')
  $('form-reg').classList.toggle('hidden', mode !== 'reg')
  $('atab-login').classList.toggle('active', mode === 'login')
  $('atab-reg').classList.toggle('active', mode === 'reg')
  $('auth-btn').textContent = mode === 'login' ? 'Login' : 'Register'
  $('auth-err').textContent = ''
  $('auth-info').classList.add('hidden')
}

$('auth-btn').onclick = async () => {
  $('auth-err').textContent = ''
  $('auth-info').classList.add('hidden')
  const btn = $('auth-btn')
  btn.disabled = true

  if (authMode === 'login') {
    const email = $('l-email').value.trim()
    const pass = $('l-pass').value
    if (!email || !pass) { $('auth-err').textContent = 'Email und Passwort erforderlich.'; btn.disabled = false; return }
    const { error } = await sb.auth.signInWithPassword({ email, password: pass })
    if (error) { $('auth-err').textContent = error.message; btn.disabled = false; return }
  } else {
    const name = $('r-name').value.trim()
    const email = $('r-email').value.trim()
    const pass = $('r-pass').value
    if (!name || !email || !pass) { $('auth-err').textContent = 'Alle Felder erforderlich.'; btn.disabled = false; return }
    if (pass.length < 6) { $('auth-err').textContent = 'Passwort min. 6 Zeichen.'; btn.disabled = false; return }
    const { error } = await sb.auth.signUp({ email, password: pass, options: { data: { username: name } } })
    if (error) { $('auth-err').textContent = error.message; btn.disabled = false; return }
    $('auth-info').textContent = 'Account erstellt. Wenn E-Mail-Bestätigung aktiv ist: Postfach prüfen.'
    $('auth-info').classList.remove('hidden')
  }
  btn.disabled = false
}

// Enter key on password inputs
$('l-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('auth-btn').click() })
$('r-pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('auth-btn').click() })

$('logout-btn').onclick = async () => {
  if (rtChannel) sb.removeChannel(rtChannel)
  await sb.auth.signOut()
}

// ── Session listener ──
sb.auth.onAuthStateChange((_evt, session) => {
  if (session?.user) {
    user = session.user
    username = user.user_metadata?.username || user.email.split('@')[0]
    startApp()
  } else {
    user = null
    username = ''
    $('auth').style.display = 'flex'
    $('app').classList.remove('on')
  }
})

// ── App Start ──
async function startApp() {
  $('uname-display').textContent = username
  $('auth').style.display = 'none'
  $('app').classList.add('on')
  setView('chat')
  await loadMessages()
  subscribeChat()
  await loadNotes()
}

// ── View Switch ──
$('vtab-chat').onclick = () => setView('chat')
$('vtab-notes').onclick = () => setView('notes')

function setView(v) {
  const isChat = v === 'chat'
  $('chat-view').classList.toggle('on', isChat)
  $('notes-view').classList.toggle('on', !isChat)
  $('vtab-chat').classList.toggle('on', isChat)
  $('vtab-notes').classList.toggle('on', !isChat)
  // Note: need inline flex for notes-view
  $('notes-view').style.display = isChat ? 'none' : 'flex'
  $('chat-view').style.display = isChat ? 'flex' : 'none'
}

// ── Chat ──
async function loadMessages() {
  const { data, error } = await sb.from('messages')
    .select('*').order('created_at', { ascending: true }).limit(300)
  if (error) { console.error(error); return }
  const list = $('msg-list')
  list.innerHTML = ''
  if (data.length === 0) {
    const empty = document.createElement('div')
    empty.className = 'empty-state'
    empty.id = 'chat-empty'
    empty.style.cssText = 'flex:1;margin:auto'
    empty.innerHTML = '<span class="empty-state-icon">◈</span>No messages yet'
    list.appendChild(empty)
  } else {
    data.forEach(m => appendMsg(m, false))
  }
  list.scrollTop = list.scrollHeight
}

function appendMsg(m, scroll = true) {
  // Remove empty state
  const empty = $('chat-empty')
  if (empty) empty.remove()

  const isOwn = m.user_id === user?.id
  const el = document.createElement('div')
  el.className = 'msg' + (isOwn ? ' own' : '')
  const time = new Date(m.created_at).toLocaleTimeString('de', { hour: '2-digit', minute: '2-digit' })
  el.innerHTML = `<div class="msg-meta"><span class="who">${esc(m.username)}</span><span class="time">${time}</span></div><div class="msg-content">${esc(m.content)}</div>`
  $('msg-list').appendChild(el)
  if (scroll) {
    const list = $('msg-list')
    if (list.scrollHeight - list.scrollTop - list.clientHeight < 100) {
      list.scrollTop = list.scrollHeight
    }
  }
}

function subscribeChat() {
  rtChannel = sb.channel('room')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, p => {
      appendMsg(p.new)
    })
    .subscribe()
}

async function sendMsg() {
  const inp = $('chat-in')
  const content = inp.value.trim()
  if (!content || !user) return
  inp.value = ''
  inp.style.height = ''
  const { error } = await sb.from('messages').insert({ user_id: user.id, username, content })
  if (error) toast('Fehler: ' + error.message)
}

$('send-btn').onclick = sendMsg

$('chat-in').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg() }
})

$('chat-in').addEventListener('input', function () {
  this.style.height = 'auto'
  this.style.height = Math.min(this.scrollHeight, 120) + 'px'
})

// ── Notes ──
async function loadNotes() {
  const { data, error } = await sb.from('notes')
    .select('id, title, username, updated_at')
    .order('updated_at', { ascending: false })
  if (error) { console.error(error); return }

  const list = $('note-list')
  list.innerHTML = ''
  data.forEach(n => {
    const el = document.createElement('div')
    el.className = 'note-item'
    el.dataset.id = n.id
    const date = new Date(n.updated_at).toLocaleDateString('de', { day: '2-digit', month: '2-digit' })
    el.innerHTML = `<div class="note-item-title">${esc(n.title)}</div><div class="note-item-meta">${esc(n.username)} · ${date}</div>`
    el.onclick = () => openNote(n.id)
    list.appendChild(el)
  })
}

async function openNote(id) {
  const { data, error } = await sb.from('notes').select('*').eq('id', id).single()
  if (error) { toast('Laden fehlgeschlagen'); return }
  currentNote = data
  noteMode = 'view'

  document.querySelectorAll('.note-item').forEach(el => el.classList.toggle('on', el.dataset.id === id))
  showNotePanel()
  $('note-title').value = data.title
  renderViewer(data.content)
}

function showNotePanel() {
  $('notes-empty').classList.add('hidden')
  $('note-panel').classList.remove('hidden')
  $('note-panel').style.display = 'flex'
}

function renderViewer(content) {
  $('note-editor').classList.add('hidden')
  const viewer = $('note-viewer')
  viewer.classList.remove('hidden')
  viewer.innerHTML = marked.parse(content || '')
  $('toggle-mode-btn').textContent = 'Edit'
  noteMode = 'view'
}

function renderEditor(content) {
  $('note-viewer').classList.add('hidden')
  const editor = $('note-editor')
  editor.classList.remove('hidden')
  editor.value = content || ''
  editor.focus()
  $('toggle-mode-btn').textContent = 'Preview'
  noteMode = 'edit'
}

$('toggle-mode-btn').onclick = () => {
  if (noteMode === 'view') {
    renderEditor(currentNote?.content || '')
  } else {
    const c = $('note-editor').value
    if (currentNote) currentNote.content = c
    renderViewer(c)
  }
}

$('new-note-btn').onclick = () => {
  currentNote = { id: null, title: '', content: '' }
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('on'))
  showNotePanel()
  $('note-title').value = ''
  renderEditor('')
}

$('save-note-btn').onclick = async () => {
  const title = $('note-title').value.trim() || 'Untitled'
  const content = noteMode === 'edit' ? $('note-editor').value : (currentNote?.content || '')

  if (currentNote?.id) {
    const { error } = await sb.from('notes')
      .update({ title, content, updated_at: new Date().toISOString() })
      .eq('id', currentNote.id)
    if (error) { toast('Speichern fehlgeschlagen'); return }
    currentNote = { ...currentNote, title, content }
  } else {
    const { data, error } = await sb.from('notes')
      .insert({ user_id: user.id, username, title, content })
      .select().single()
    if (error) { toast('Speichern fehlgeschlagen'); return }
    currentNote = data
  }
  toast('Gespeichert ✓')
  await loadNotes()
  if (currentNote?.id) {
    document.querySelectorAll('.note-item').forEach(el =>
      el.classList.toggle('on', el.dataset.id === currentNote.id))
  }
}

$('del-note-btn').onclick = async () => {
  if (!currentNote?.id) {
    currentNote = null; resetNotePanel(); return
  }
  const { error } = await sb.from('notes').delete().eq('id', currentNote.id)
  if (error) { toast('Löschen fehlgeschlagen'); return }
  currentNote = null
  toast('Gelöscht')
  await loadNotes()
  resetNotePanel()
}

function resetNotePanel() {
  $('note-panel').classList.add('hidden')
  $('notes-empty').classList.remove('hidden')
  document.querySelectorAll('.note-item').forEach(el => el.classList.remove('on'))
}

$('md-upload').onchange = async (e) => {
  const file = e.target.files[0]
  if (!file) return
  const reader = new FileReader()
  reader.onload = async ev => {
    const content = ev.target.result
    const title = file.name.replace(/\.(md|txt)$/i, '')
    const { data, error } = await sb.from('notes')
      .insert({ user_id: user.id, username, title, content })
      .select().single()
    if (error) { toast('Upload fehlgeschlagen'); return }
    toast(`"${title}" hochgeladen`)
    await loadNotes()
    openNote(data.id)
  }
  reader.readAsText(file)
  e.target.value = ''
}

// ── Service Worker (PWA) ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
